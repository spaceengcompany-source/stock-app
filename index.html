<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEC 在庫管理（履歴付き）</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5;}
header{background:#2c3e50;color:white;padding:10px;display:flex;justify-content:space-between;}
.container{padding:10px;}
.card{background:white;padding:10px;margin-bottom:10px;border-radius:8px;}
input{width:100%;padding:8px;margin:5px 0;}
button{padding:6px;margin:3px;}
.log{font-size:12px;color:#555;}
</style>

</head>

<body>

<header>
<div>
<b>SEC 在庫管理（履歴）</b><br>
<span id="user"></span>
</div>
<div id="date"></div>
</header>

<div class="container">

<button onclick="login()">ログイン</button> <button onclick="showForm()">＋新規登録</button>

<div id="list"></div>

<h3>履歴</h3>
<div id="log"></div>

<div id="form" style="display:none;">
品名<input id="name">
型番<input id="model">
初期数量<input id="qty" type="number">
場所<input id="place">

<button onclick="save()">保存</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, signInWithPopup, GoogleAuthProvider,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfhiORezh7AuVqJ-i7FJW4htnry5LKC-8",
  authDomain: "stock-app-6168b.firebaseapp.com",
  projectId: "stock-app-6168b",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const stockCol = collection(db, "stock");
const logCol = collection(db, "log");

let currentUser = "未ログイン";

document.getElementById("date").innerText = new Date().toLocaleDateString();

// ログイン
window.login = async ()=>{
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
}

onAuthStateChanged(auth, user=>{
  if(user){
    currentUser = user.displayName;
    document.getElementById("user").innerText = "👤 "+user.displayName;
  }
});

// 登録
window.showForm = ()=>{
  document.getElementById("form").style.display="block";
}

window.save = async ()=>{
  const item={
    name: name.value,
    model: model.value,
    qty: Number(qty.value),
    place: place.value
  };
  await addDoc(stockCol,item);
}

// 入庫
window.inStock = async(id,data)=>{
  let newQty = data.qty + 1;
  await updateDoc(doc(db,"stock",id),{qty:newQty});

  await addDoc(logCol,{
    name:data.name,
    type:"入庫",
    qty:1,
    user:currentUser,
    time:new Date().toLocaleString()
  });
}

// 出庫
window.outStock = async(id,data)=>{
  let newQty = data.qty - 1;
  if(newQty<0)return alert("在庫不足");

  await updateDoc(doc(db,"stock",id),{qty:newQty});

  await addDoc(logCol,{
    name:data.name,
    type:"出庫",
    qty:1,
    user:currentUser,
    time:new Date().toLocaleString()
  });
}

// 在庫表示
onSnapshot(stockCol,(snap)=>{
  let html="";
  snap.forEach(docu=>{
    const d=docu.data();
    const id=docu.id;

    html+=`
    <div class="card">
    <b>${d.name}</b> (${d.model})<br>
    在庫:${d.qty}<br>
    場所:${d.place}<br>
    <button onclick='inStock("${id}",${JSON.stringify(d)})'>＋入庫</button>
    <button onclick='outStock("${id}",${JSON.stringify(d)})'>−出庫</button>
    </div>
    `;
  });
  list.innerHTML=html;
});

// 履歴表示
onSnapshot(logCol,(snap)=>{
  let html="";
  snap.forEach(docu=>{
    const d=docu.data();
    html+=`
    <div class="log">
    ${d.time} | ${d.user} | ${d.name} | ${d.type}(${d.qty})
    </div>
    `;
  });
  log.innerHTML=html;
});

</script>

</body>
</html>
